name: Deploy Staging

on:
  push:
    branches: [develop]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
            infrastructure/package-lock.json

      - name: Install dependencies
        run: |
          cd infrastructure && npm ci
          cd ../frontend && npm ci
          cd ../backend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ''
          VITE_CUSTOMER_POOL_ID: ${{ vars.CUSTOMER_POOL_ID }}
          VITE_CUSTOMER_CLIENT_ID: ${{ vars.CUSTOMER_CLIENT_ID }}
          VITE_TEAM_POOL_ID: ${{ vars.TEAM_POOL_ID }}
          VITE_TEAM_CLIENT_ID: ${{ vars.TEAM_CLIENT_ID }}
          VITE_AWS_REGION: eu-central-1

      - name: Build backend
        run: cd backend && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: CDK Deploy
        run: |
          cd infrastructure
          npx cdk deploy SapInnovation-staging --require-approval never -c env=staging

      - name: Deploy frontend to S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name SapInnovation-staging --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          aws s3 sync frontend/dist/ s3://$BUCKET --delete

      - name: Invalidate CloudFront
        run: |
          CF_ID=$(aws cloudformation describe-stacks --stack-name SapInnovation-staging --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
          aws cloudfront create-invalidation --distribution-id $CF_ID --paths "/*"
